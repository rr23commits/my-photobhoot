<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoBhoot — Analog Photo Booth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app">
  <header class="topbar">
    <a class="topbar__left" href="/index.html" aria-label="PhotoBhoot home">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="wordmark">PhotoBhoot</span>
    </a>
    <nav class="topbar__nav" aria-label="Primary">
      <a href="/booth.html" class="nav-link">Booth</a>
      <a href="/gallery.html" class="nav-link">Gallery</a>
      <a href="/login.html" class="nav-link">Sign in</a>
    </nav>
  </header>

  <main class="landing">
    <span class="mono-label landing__kicker">Analog Photo Booth · Est. 2026</span>
    <h1 class="landing__title">PhotoBhoot</h1>
    <p class="landing__tagline">
      Step into the booth, strike three poses, and develop them onto a
      film-lab strip — black-and-white stocks, frames, and a caption.
      Save your strips to a private gallery.
    </p>
    <div class="landing__actions">
      <a href="/booth.html" class="btn btn--primary">Enter the Booth</a>
      <a href="/gallery.html" class="btn btn--ink">View Gallery</a>
    </div>
  </main>

  <script type="module" src="/src/landing.js"></script>
</body>
</html>
